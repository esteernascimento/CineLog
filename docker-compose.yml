services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: user_cinelog
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: cinelog
    ports:
      - "5432:5432"
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123